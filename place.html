<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<link rel="stylesheet" href="css/place.css">
</head>

<body id="hero-section">

<div class="hero">
    <div>
        <h1 id="place-title"></h1>
        <p id="place-description"></p>
    </div>
</div>

<div id="renovation-notice" style="display: none;" class="renovation-notice">
    <div class="notice-content">
        <span class="notice-icon">🔧</span>
        <div class="notice-text">
            <strong>Renovation Notice:</strong> 
            Some areas of this destination are currently under renovation. 
            Certain attractions may have limited access.
        </div>
        <button class="notice-close" onclick="this.parentElement.parentElement.style.display='none'">✕</button>
    </div>
</div>

<!-- MORNING -->
<div class="section-box">
    <h2 class="section-title">🌄 Misty Morning Bliss</h2>
    <div class="card-grid" id="morning-section"></div>
</div>

<!-- AFTERNOON -->
<div class="section-box">
    <h2 class="section-title">🌲 Afternoon Adventure</h2>
    <div class="card-grid" id="afternoon-section"></div>
</div>

<!-- EVENING -->
<div class="section-box">
    <h2 class="section-title">🌆 Golden Hour Magic</h2>
    <div class="card-grid" id="evening-section"></div>
</div>

<!-- PLACES TO VISIT -->
<div class="section-box">
    <h2 class="section-title">Places To Visit</h2>
    <div class="card-grid" id="hidden-section"></div>
</div>

<!-- WHERE TO STAY -->
<div class="section-box">
    <h2 class="section-title">Where to Stay</h2>
    <div class="card-grid" id="stay-section"></div>
</div>

<!-- FOOD & SOUVENIRS -->
<div class="section-box">
    <h2 class="section-title">Taste & Take Home</h2>
    <div class="card-grid" id="food-section"></div>
</div>

<!-- ENTRY FEES SECTION -->
<div class="section-box" id="fees-section">
    <h2 class="section-title">💰 Entry Fees & Practical Info</h2>
    <div class="fees-info">
        <div class="fees-general" id="fees-general"></div>
        <div class="card-grid" id="fees-grid"></div>
    </div>
</div>

<div class="wave-container">
    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>
</div>

<script src="js/place.js"></script>
</body>
</html>
